name: build-backend-optimized

on:
  workflow_dispatch:
  push:
    branches: main

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            platform: amd64
          - os: ubuntu-24.04-arm # 使用 GitHub 原生 ARM 執行器
            platform: arm64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push by arch
        uses: docker/build-push-action@v6
        with:
          context: ./backend  # 指向你的後端資料夾
          push: true
          # 為每個架構推送到暫存標籤
          tags: ghcr.io/wensheng31/paper_agrimind:${{ github.sha }}-${{ matrix.platform }}
          platforms: linux/${{ matrix.platform }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  merge:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push manifest
        run: |
          # 建立 Manifest 關聯兩個架構的 Image
          docker buildx imagetools create -t ghcr.io/wensheng31/paper_agrimind:latest \
            -t ghcr.io/wensheng31/paper_agrimind:${{ github.sha }} \
            ghcr.io/wensheng31/paper_agrimind:${{ github.sha }}-amd64 \
            ghcr.io/wensheng31/paper_agrimind:${{ github.sha }}-arm64
