name: build-backend

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-backend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # - name: Build project
      #   working-directory: ./backend
      #   run: |
      #     pip install --no-cache-dir -r requirements.txt
      
      # 登入到 GitHub Container Registry (ghcr.io)
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./backend      # 指向你的後端資料夾
          push: true
          # 格式：ghcr.io/使用者名稱/鏡像名稱:標籤
          tags: |
            ghcr.io/wensheng31/paper_argimind:latest
            ghcr.io/wensheng31/paper_argimind:${{ github.sha }}
